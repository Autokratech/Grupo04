name: Frontend CI/CD

on:
  push:
    branches:
      - "release/*"
      - "64-*"
    paths:
      - "frontend/**"

env:
  PROJECT_ID: windy-skyline-490617-g7
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: autokratech-registry
  CLUSTER: gke-autokratech1
  CLUSTER_ZONE: europe-west4-a
  NAMESPACE: development
  IMAGE_NAME: frontend

jobs:

  build-frontend:
    name: Build Frontend (Flutter Web)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Autenticar Podman en Artifact Registry
        run: |
          gcloud auth print-access-token | podman login \
            --username=oauth2accesstoken \
            --password-stdin \
            ${{ env.REGISTRY }}

      - name: Build imagen frontend
        working-directory: frontend
        run: |
          podman build \
            -f Containerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push imagen frontend
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          podman push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

  deploy-frontend:
    name: Deploy Frontend en GKE (development)
    runs-on: self-hosted
    needs: build-frontend
    steps:
      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configurar gcloud y kubectl
        uses: google-github-actions/setup-gcloud@v2

      - name: Conectar al cluster GKE
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --zone=${{ env.CLUSTER_ZONE }} \
            --project=${{ env.PROJECT_ID }}

      - name: Actualizar imagen frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Verificar estado
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}