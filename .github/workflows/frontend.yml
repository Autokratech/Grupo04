name: Frontend CI/CD
 
on:
  push:
    branches:
      - "release/*"
      - "64-*"
    paths:
      - "frontend/**"
 
env:
  IMAGE_TAG: ${{ github.sha }}
  #Variables de GCP
  PROJECT_ID: windy-skyline-490617-g7
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: autokratech-registry
  CLUSTER: gke-autokratech1
  CLUSTER_ZONE: europe-west4-a
  NAMESPACE: development
  IMAGE_NAME: frontend
   #Variables de Azure
  ACR_REGISTRY: autokratechRegistry.azurecr.io


jobs:
 
  build-frontend:
    name: Build Frontend (Flutter Web)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Publicación de la imagen en el registry de Azure
      - name: Azure - Image Build 
        run: |
          podman build -t autokratech-frontend:${{ env.IMAGE_TAG }} ./frontend
          podman tag autokratech-frontend:${{ env.IMAGE_TAG }} ${{ env.ACR_REGISTRY }}/autokratech-frontend:${{ env.IMAGE_TAG }}

      - name: Azure - Login Azure Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "${{ secrets.ARM_CLIENT_SECRET }}" | podman login ${{ env.ACR_REGISTRY }} \
          --username "${{ vars.ARM_CLIENT_ID }}" \
          --password-stdin

      - name: Azure - Push Podman image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          podman push ${{ env.ACR_REGISTRY }}/autokratech-frontend:${{ env.IMAGE_TAG }}

      # Publicación de la imagen en el registry de GCP
      - name: GCP - Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
 
      - name: GCP - Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
 
      - name: GCP - Autenticar Podman en Artifact Registry
        run: |
          gcloud auth print-access-token | podman login \
            --username=oauth2accesstoken \
            --password-stdin \
            ${{ env.REGISTRY }}
 
      - name: GCP - Build imagen frontend
        working-directory: frontend
        run: |
          podman build \
            -f Containerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .
 
      - name: GCP - Push imagen frontend
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          podman push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest



  deploy-frontend:
    name: Deploy Frontend en GKE (development)
    runs-on: self-hosted
    needs: build-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
 
      - name: Configurar gcloud y kubectl
        uses: google-github-actions/setup-gcloud@v2
 
      - name: Conectar al cluster GKE
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --zone=${{ env.CLUSTER_ZONE }} \
            --project=${{ env.PROJECT_ID }}
 
      - name: Actualizar imagen en los YAMLs
        run: |
          sed -i "s|image:.*frontend.*|image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            infra/gcp/k8s/development/frontend-deployment.yaml
 
      - name: Desplegar en GKE development
        run: |
          kubectl apply -f infra/gcp/k8s/development/frontend-deployment.yaml
          kubectl apply -f infra/gcp/k8s/development/frontend-service.yaml
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} --timeout=120s
 
      - name: Verificar estado
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
