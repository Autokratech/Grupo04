apiVersion: v1
kind: Service
metadata:
  name: {{ include "autokratech-backend.fullname" . }}
  labels:
{{ include "autokratech-backend.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8001
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: {{ include "autokratech-backend.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
